<style>
  :root{
    --bg:#1e1b3a; --bg2:#272251; --card:#2f2a5e; --card2:#35306b;
    --ink:#f3f0ff; --muted:#c7c0ee; --line:#4b458a;
    --warm:#f2c58c; --warm2:#e7a86b; --accent:#b9a4ff; --accent2:#8f77e6;
    --ok:#7fe0a6;
    --nissim:#7bd0ff; --amit:#ffb3d1; --claude:#a9f0c6; --together:#ffd98a;
  }
  *{box-sizing:border-box}
  body{
    margin:0; direction:rtl;
    background:linear-gradient(160deg,var(--bg),var(--bg2));
    color:var(--ink);
    font-family:'Heebo','Assistant','Segoe UI',Arial,sans-serif;
    font-size:16px; line-height:1.7; word-spacing:.05em; min-height:100vh;
  }
  .wrap{max-width:1000px; margin:0 auto; padding:24px 18px 90px}
  header.top{text-align:center; padding:10px 8px 4px}
  header.top h1{margin:0; font-size:28px; font-weight:800}
  header.top .moon{color:var(--warm)}
  header.top .sub{color:var(--muted); margin-top:6px; font-size:14px}
  .en{unicode-bidi:isolate; direction:ltr; display:inline-block}

  .summary{background:#00000030; border:1px solid var(--line); border-radius:18px;
    padding:20px 22px; margin:20px 0 14px; text-align:center}
  .pct{font-size:44px; font-weight:800; color:var(--warm); line-height:1}
  .pct small{font-size:16px; color:var(--muted); font-weight:500}
  .count{color:var(--muted); font-size:14.5px; margin-top:4px}
  .bar-wrap{margin:14px auto 2px; max-width:640px; background:#00000040;
    border:1px solid var(--line); border-radius:40px; height:22px; overflow:hidden}
  .bar{height:100%; width:0; border-radius:40px;
    background:linear-gradient(90deg,var(--warm2),var(--warm)); transition:width .5s ease}

  .toolbar{display:flex; gap:10px; justify-content:center; align-items:center;
    flex-wrap:wrap; margin:12px 0 6px; color:var(--muted); font-size:13px}
  .toolbar button{background:var(--card2); color:var(--ink); border:1px solid var(--line);
    border-radius:10px; padding:7px 16px; cursor:pointer; font-family:inherit; font-size:13.5px}
  .toolbar button:hover{background:var(--accent2)}

  .filters{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:14px 0 6px}
  .chip{font-size:13px; padding:5px 14px; border-radius:30px; cursor:pointer;
    border:1px solid var(--line); background:var(--card); color:var(--ink); font-family:inherit}
  .chip.active{background:var(--accent2); border-color:var(--accent)}
  .chip .dot{display:inline-block; width:9px; height:9px; border-radius:50%; margin-inline-end:6px; vertical-align:middle}

  .stage{background:var(--card); border:1px solid var(--line); border-radius:16px;
    margin:14px 0; overflow:hidden}
  .stage.done{border-color:var(--ok)}
  .stage .shead{display:flex; align-items:center; gap:12px; padding:14px 18px;
    background:var(--card2)}
  .stage.done .shead{background:#26603f66}
  .stage .shead h2{margin:0; font-size:17px; font-weight:700; flex:1}
  .stage .shead .sc{font-size:12.5px; font-weight:800; color:#241f45; background:var(--muted);
    border-radius:20px; padding:2px 10px; white-space:nowrap}
  .stage.done .shead .sc{background:var(--ok)}
  .stage .sbar{height:5px; background:#00000040}
  .stage .sbar > i{display:block; height:100%; background:var(--warm2)}
  .tasks{padding:6px 18px 12px}
  .task{display:flex; align-items:flex-start; gap:11px; padding:10px 0;
    border-top:1px solid #ffffff12}
  .task:first-child{border-top:none}
  .task .box{flex:none; width:22px; height:22px; margin-top:1px; font-size:20px; line-height:1;
    text-align:center; color:var(--muted)}
  .task.on .box{color:var(--ok)}
  .task .body{flex:1; min-width:0}
  .task .txt{font-size:15px}
  .task.on .txt{text-decoration:line-through; color:var(--muted)}
  .task .meta{margin-top:3px; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .owner{font-size:11px; font-weight:800; color:#20203a; border-radius:20px; padding:2px 9px; white-space:nowrap}
  .when{color:var(--muted); font-size:12px}

  .state{text-align:center; color:var(--muted); padding:40px 10px; font-size:15px}
  .state.err{color:var(--amit)}
  .foot{color:var(--muted); font-size:12.5px; text-align:center; margin-top:26px}
  .foot a{color:var(--accent)}
</style>
</head>

    התצוגה נקראת ישירות מגיליון <span class="en">"לומה וקוקו · מעקב פייפליין"</span>.

</div>

<script>
  var SHEET_ID = "11DSCTr-ZoXLwQQR8E0y5Nb0DhQM2OXnV-kzSIcOUoEk";
  var GID = "1954081799";
  var OWNERS = {
    "ניסים":"var(--nissim)", "עמית":"var(--amit)", "קלוד":"var(--claude)", "ביחד":"var(--together)"
  };
  var activeFilter = "הכל";
  var lastData = null;

  function jsonp(cb){
    var name = "__lumacb_" + Date.now();
    window[name] = function(resp){ try{ cb(null, resp); } finally { delete window[name]; if(s.parentNode) s.parentNode.removeChild(s); } };
    var s = document.createElement("script");
    s.onerror = function(){ cb(new Error("network")); if(s.parentNode) s.parentNode.removeChild(s); };
    s.src = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json;responseHandler:" + name + "&gid=" + GID + "&_=" + Date.now();
    document.body.appendChild(s);
  }

  function parse(resp){
    if(!resp || !resp.table || !resp.table.rows) return [];
    return resp.table.rows.map(function(r){
      var c = r.c || [];
      function v(i){ return c[i] && c[i].v != null ? c[i].v : ""; }
      return {
        done: c[0] && c[0].v === true,
        stage: String(v(1)||"").trim(),
        task: String(v(2)||"").trim(),
        owner: String(v(3)||"").trim(),
        when: String(v(4)||"").trim()
      };
    }).filter(function(t){ return t.task; });
  }

  function esc(s){ return String(s).replace(/[&<>]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]; }); }

  function render(tasks){
    lastData = tasks;
    var filtered = tasks.filter(function(t){ return activeFilter === "הכל" || t.owner === activeFilter; });
    var total = filtered.length;
    var done = filtered.filter(function(t){ return t.done; }).length;
    var pct = total ? Math.round(done/total*100) : 0;

    document.getElementById("pct").innerHTML = pct + '<small>%</small>';
    document.getElementById("count").textContent = done + " מתוך " + total + " משימות בוצעו";
    document.getElementById("bar").style.width = pct + "%";

    // group by stage, preserve order of appearance
    var order = [], groups = {};
    filtered.forEach(function(t){
      if(!groups[t.stage]){ groups[t.stage] = []; order.push(t.stage); }
      groups[t.stage].push(t);
    });

    var html = "";
    if(!total){ html = '<div class="state">אין משימות לתצוגה בסינון הזה.</div>'; }
    order.forEach(function(st){
      var items = groups[st];
      var d = items.filter(function(t){ return t.done; }).length;
      var m = items.length;
      var p = m ? Math.round(d/m*100) : 0;
      var allDone = d === m && m > 0;
      html += '<div class="stage' + (allDone?' done':'') + '">';
      html += '<div class="shead"><h2>' + esc(st) + '</h2><span class="sc">' + d + '/' + m + '</span></div>';
      html += '<div class="sbar"><i style="width:' + p + '%"></i></div>';
      html += '<div class="tasks">';
      items.forEach(function(t){
        var color = OWNERS[t.owner] || "var(--muted)";
        html += '<div class="task' + (t.done?' on':'') + '">';
        html += '<div class="box">' + (t.done ? '☑' : '☐') + '</div>';
        html += '<div class="body"><div class="txt">' + esc(t.task) + '</div><div class="meta">';
        if(t.owner) html += '<span class="owner" style="background:' + color + '">' + esc(t.owner) + '</span>';
        if(t.when) html += '<span class="when">' + esc(t.when) + '</span>';
        html += '</div></div></div>';
      });
      html += '</div></div>';
    });
    document.getElementById("content").innerHTML = html;
  }

  function buildFilters(tasks){
    var owners = ["הכל"];
    tasks.forEach(function(t){ if(t.owner && owners.indexOf(t.owner) < 0) owners.push(t.owner); });
    var box = document.getElementById("filters");
    box.innerHTML = "";
    owners.forEach(function(o){
      var b = document.createElement("button");
      b.className = "chip" + (o === activeFilter ? " active" : "");
      var dot = o === "הכל" ? "" : '<span class="dot" style="background:' + (OWNERS[o]||"var(--muted)") + '"></span>';
      b.innerHTML = dot + esc(o);
      b.onclick = function(){ activeFilter = o; buildFilters(lastData); render(lastData); };
      box.appendChild(b);
    });
  }

  function pad(n){ return n<10 ? "0"+n : ""+n; }

  function load(){
    document.getElementById("refresh").textContent = "↻ טוען…";
    jsonp(function(err, resp){
      document.getElementById("refresh").textContent = "↻ רענון";
      if(err){
        document.getElementById("content").innerHTML = '<div class="state err">לא הצלחתי לטעון מהגיליון. בדקו חיבור לאינטרנט ונסו רענון.</div>';
        return;
      }
      var tasks = parse(resp);
      buildFilters(tasks);
      render(tasks);
      var d = new Date();
      document.getElementById("updated").textContent = "עודכן: " + pad(d.getHours()) + ":" + pad(d.getMinutes());
    });
  }

  document.getElementById("refresh").onclick = load;
  load();
</script>
</body>
</html>
